<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="1200"
    height="650"
    viewBox="0 0 1200 650"
    role="img"
    aria-labelledby="title desc">
  <title id="title">Interactive World Map</title>
  <desc id="desc">Simplified clickable world map for region-based problem browsing.</desc>

  <style>
    .region {
      fill: #dbeafe;
      stroke: #334155;
      stroke-width: 2.2;
      transition: fill 0.2s ease, opacity 0.2s ease, transform 0.2s ease;
    }
    .region:hover {
      fill: #93c5fd;
    }
    .label {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 24px;
      fill: #0f172a;
      text-anchor: middle;
      pointer-events: none;
      font-weight: 700;
    }
    .subtle {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      fill: #475569;
      text-anchor: middle;
      pointer-events: none;
    }
    .ocean {
      fill: #f8fafc;
    }
    .frame {
      fill: none;
      stroke: #cbd5e1;
      stroke-width: 2;
      rx: 20;
    }
  </style>

  <rect class="ocean" x="0" y="0" width="1200" height="650" rx="24"/>

  <!-- Decorative frame -->
  <rect class="frame" x="18" y="18" width="1164" height="614" rx="22"/>

