<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="960"
  height="620"
  viewBox="0 0 960 620"
  role="img"
  aria-labelledby="title desc">
  <title id="title">North America Regional Problem Map</title>
  <desc id="desc">A clickable North America map with ICPC-style regional sections for problem browsing.</desc>

  <style>
    .ocean {
      fill: #f8fafc;
    }
    .frame {
      fill: none;
      stroke: #cbd5e1;
      stroke-width: 2;
      rx: 20;
    }
    .continent {
      fill: #eff6ff;
      stroke: #94a3b8;
      stroke-width: 3;
    }
    .world-region {
      fill: #f1f5f9;
      stroke: #cbd5e1;
      stroke-width: 1.8;
      fill-rule: evenodd;
      clip-rule: evenodd;
    }
    .region {
      fill: #dbeafe;
      stroke: #1d4ed8;
      stroke-width: 2.5;
      transition: fill 0.2s ease, transform 0.2s ease, filter 0.2s ease;
      transform-origin: center;
    }
    .region:hover,
    .region:focus,
    .region.is-active {
      fill: #60a5fa;
      filter: drop-shadow(0 8px 14px rgba(37, 99, 235, 0.22));
      outline: none;
    }
    .region.is-active {
      fill: #2563eb;
    }
    .label {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 21px;
      fill: #0f172a;
      text-anchor: middle;
      pointer-events: none;
      font-weight: 700;
    }
    .subtle {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      fill: #475569;
      text-anchor: middle;
      pointer-events: none;
    }
    .region-text {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 16px;
      fill: #0f172a;
      text-anchor: middle;
      pointer-events: none;
      font-weight: 700;
    }
    .region-text tspan {
      x: inherit;
    }
  </style>

  <rect class="ocean" x="0" y="0" width="960" height="620" rx="24"/>
  <rect class="frame" x="18" y="18" width="924" height="584" rx="22"/>

  <path id="world" class="region world-region" d="
    M30,30
    H930
    V590
    H30
    Z
    M124,136
    C164,96 214,72 278,66
    C346,60 418,78 474,116
    C516,144 546,186 560,236
    C586,224 616,226 642,246
    C680,276 694,316 686,360
    C678,404 652,444 616,470
    C588,490 554,504 520,510
    C484,516 444,510 412,494
    C386,482 360,468 332,462
    C292,454 258,436 232,404
    C198,364 168,332 154,284
    C138,232 134,184 124,136
    Z
    M636,458
    C650,470 664,490 668,508
    C672,528 666,548 650,564
    C636,578 614,584 596,578
    C580,572 570,556 572,538
    C576,508 600,480 636,458
    Z"/>

  <path class="continent" d="
    M124,136
    C164,96 214,72 278,66
    C346,60 418,78 474,116
    C516,144 546,186 560,236
    C586,224 616,226 642,246
